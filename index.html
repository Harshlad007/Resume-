<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Resume Builder</title>

<!-- Link CSS -->
<link rel="stylesheet" href="style.css">

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<h1>Premium Resume Builder</h1>

<div class="form">
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">

    <textarea id="about" placeholder="About You"></textarea>
    <input type="text" id="skills" placeholder="Skills (comma separated)">
    <textarea id="education" placeholder="Education"></textarea>
    <textarea id="experience" placeholder="Experience"></textarea>

    <input type="file" id="image">

    <button onclick="generateResume()">Generate Resume</button>
    <button onclick="downloadPDF()">Download Premium PDF</button>
</div>

<div id="resume">
    <div class="section" id="header">
        <img id="preview-img" src="https://via.placeholder.com/100">
        <h2 id="preview-name">Your Name</h2>
        <p id="preview-email">email@example.com</p>
        <p id="preview-phone">XXXXXXXXXX</p>
    </div>

    <div class="section">
        <h3>About</h3>
        <p id="preview-about">---</p>
    </div>

    <div class="page-break"></div>

    <div class="section">
        <h3>Skills</h3>
        <div id="preview-skills">---</div>
    </div>

    <div class="page-break"></div>

    <div class="section">
        <h3>Education</h3>
        <p id="preview-education">---</p>
    </div>

    <div class="page-break"></div>

    <div class="section">
        <h3>Experience</h3>
        <p id="preview-experience">---</p>
    </div>
</div>

<!-- Link JS -->
<script src="script.js"></script>
</body>
</html>
