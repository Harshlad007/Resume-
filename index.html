<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>✨ Build Your Professional Resume</h1>

<div class="container">

    <!-- FORM -->
    <div class="form">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone">

        <textarea id="about" placeholder="About You"></textarea>
        <input type="text" id="skills" placeholder="Skills (comma separated)">
        <textarea id="education" placeholder="Education"></textarea>
        <textarea id="experience" placeholder="Experience"></textarea>

        <input type="file" id="image">

        <button onclick="generateResume()">Generate Resume</button>
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview">
        <img id="preview-img" src="https://via.placeholder.com/120">

        <h2 id="preview-name">Your Name</h2>
        <p id="preview-email">email@example.com</p>
        <p id="preview-phone">XXXXXXXXXX</p>

        <div class="section">
            <h3>About</h3>
            <p id="preview-about">---</p>
        </div>

        <div class="section">
            <h3>Skills</h3>
            <p id="preview-skills">---</p>
        </div>

        <div class="section">
            <h3>Education</h3>
            <p id="preview-education">---</p>
        </div>

        <div class="section">
            <h3>Experience</h3>
            <p id="preview-experience">---</p>
        </div>
    </div>

</div>

<!-- PDF -->
<div id="resume-pdf">

    <!-- PAGE 1 -->
    <div class="pdf-section">
        <img id="pdf-img">
        <h2 id="pdf-name"></h2>
        <p id="pdf-email"></p>
        <p id="pdf-phone"></p>
    </div>

    <!-- PAGE 2 -->
    <div class="pdf-section">
        <h3>About</h3>
        <p id="pdf-about"></p>
    </div>

    <!-- PAGE 3 -->
    <div class="pdf-section">
        <h3>Skills</h3>
        <p id="pdf-skills"></p>
    </div>

    <!-- PAGE 4 -->
    <div class="pdf-section">
        <h3>Education</h3>
        <p id="pdf-education"></p>
    </div>

    <!-- PAGE 5 -->
    <div class="pdf-section">
        <h3>Experience</h3>
        <p id="pdf-experience"></p>
    </div>

</div>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <p>Generating PDF...</p>
</div>

<!-- SUCCESS POPUP -->
<div id="success-popup">
    <div class="popup-box">
        <h2>✅ Download Complete</h2>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<!-- GENERATE POPUP -->
<div id="generate-popup">
    <div class="popup-box">
        <h2>✨ Resume Generated</h2>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
