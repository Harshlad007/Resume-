<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>📄 Resume Builder</h1>

<div class="container">

    <!-- FORM -->
    <div class="form">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="phone" placeholder="Phone">

        <textarea id="about" placeholder="About You"></textarea>
        <input type="text" id="skills" placeholder="Skills (comma separated)">
        <textarea id="education" placeholder="Education"></textarea>
        <textarea id="experience" placeholder="Experience"></textarea>

        <input type="file" id="image">

        <button onclick="generateResume()">Generate Resume</button>
        <button onclick="downloadPDF()">Download PDF</button>
    </div>

    <!-- PREVIEW -->
    <div class="preview" id="resume">
        <img id="preview-img" src="https://via.placeholder.com/100">

        <h2 id="preview-name">Your Name</h2>
        <p id="preview-email">email@example.com</p>
        <p id="preview-phone">XXXXXXXXXX</p>

        <div class="section">
            <h3 class="section-title">About</h3>
            <p id="preview-about">---</p>
        </div>

        <div class="section">
            <h3 class="section-title">Skills</h3>
            <p id="preview-skills">---</p>
        </div>

        <div class="section">
            <h3 class="section-title">Education</h3>
            <p id="preview-education">---</p>
        </div>

        <div class="section">
            <h3 class="section-title">Experience</h3>
            <p id="preview-experience">---</p>
        </div>
    </div>

</div>

<div id="resume-pdf"></div>

<script src="script.js"></script>
</body>
</html>
